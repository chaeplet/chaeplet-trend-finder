// iframe 부모 페이지로 높이 전송 (아임웹 등에 임베드 시 자동 높이 조절)
// 안정형: 무한 루프 방지 + 디바운싱 + 안정화 카운터
(function() {
  if (window.parent === window) return; // iframe이 아니면 실행 안 함
  
  var lastSentHeight = 0;
  var stableCount = 0;
  var debounceTimer = null;
  var hasStabilized = false;
  
  // 단일 일관된 측정 방법만 사용 (다른 값이 나오는 일 없음)
  function measureHeight() {
    return document.documentElement.scrollHeight;
  }
  
  function sendHeight() {
    if (hasStabilized) return; // 안정화 후엔 자동 전송 안 함
    
    var newHeight = measureHeight();
    
    // 같은 값 ±2px 범위면 안정으로 판단
    if (Math.abs(newHeight - lastSentHeight) <= 2) {
      stableCount++;
      // 5번 연속 같은 값이면 안정화 완료, 더 이상 전송 안 함
      if (stableCount >= 5) {
        hasStabilized = true;
      }
      return;
    }
    
    // 새 값 전송
    stableCount = 0;
    lastSentHeight = newHeight;
    window.parent.postMessage({
      type: 'chaeplet-resize',
      height: newHeight
    }, '*');
  }
  
  // 디바운싱: 짧은 시간 내 여러 호출이 들어오면 마지막 것만 실행
  function debouncedSend() {
    if (debounceTimer) clearTimeout(debounceTimer);
    debounceTimer = setTimeout(sendHeight, 200);
  }
  
  // 사용자 인터랙션은 안정화를 리셋 (페이지 변경, 카테고리 클릭 등)
  function resetStabilization() {
    hasStabilized = false;
    stableCount = 0;
    debouncedSend();
  }
  
  // 초기 측정 시점 (Tailwind/Babel 컴파일 + React 렌더 모두 완료 후)
  // 한 번만 실행, 인터벌 사용 안 함
  setTimeout(sendHeight, 800);
  setTimeout(sendHeight, 1500);
  setTimeout(sendHeight, 2500);
  setTimeout(sendHeight, 4000);
  setTimeout(sendHeight, 6000);
  
  // 폰트 로드 완료 시 한 번 더
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(function() {
      setTimeout(sendHeight, 100);
    });
  }
  
  // 페이지 완전 로드 후 한 번 더
  window.addEventListener('load', function() {
    setTimeout(sendHeight, 500);
  });
  
  // 사용자 클릭/입력에만 반응 (콘텐츠 변경 가능성)
  // ResizeObserver/MutationObserver는 사용 안 함 (무한 루프 위험)
  document.addEventListener('click', function(e) {
    // 페이지네이션, 카테고리 버튼, 필터 클릭 시
    var target = e.target;
    if (target.tagName === 'BUTTON' || target.closest('button')) {
      resetStabilization();
      // 클릭 후 콘텐츠 변경 대기 (React 리렌더 시간)
      setTimeout(function() {
        hasStabilized = false;
        sendHeight();
      }, 300);
    }
  });
})();
</script>
</body>
</html>
